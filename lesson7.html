<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mission 07: Sonic Booms</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap" rel="stylesheet">
    <style>
        body { background: #0a192f; color: white; margin: 0; font-family: 'Orbitron', sans-serif; }
        .game-canvas-container { 
            border: 2px solid #00f2ff; 
            background: #112240; 
            cursor: crosshair; 
            width: 768px; 
            height: 576px; 
            margin: 0 auto;
            position: relative;
        }
        canvas { display: block; }
        .speed-indicator { margin-top: 15px; text-align: center; }
        .speed-bars { display: flex; justify-content: center; gap: 5px; height: 20px; width: 300px; margin: 5px auto; background: #060d1a; }
        .speed-bar { flex: 1; position: relative; background: #1a314d; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s; }
        #subsonicBar { background: #00ff88; }
        #transonicBar { background: #ffcc00; }
        #supersonicBar { background: #ff3366; }
    </style>
</head>
<body class="lesson-page">
    <nav class="nav-bar">
        <a href="dashboard.html" class="nav-back">← DASHBOARD</a>
        <div class="nav-logo">MISSION 07 // SONIC BOOMS</div>
        <div class="nav-xp" id="currentXP">0 ⭐</div>
    </nav>
    
    <div class="lesson-container">
        <div class="mission-header">
            <h1>💥 Sonic Boom Simulator</h1>
            <p class="mission-objective">Click and drag to launch. Watch the sound waves compress!</p>
        </div>
        
        <div class="content-card game-main">
            <div id="canvasesdiv" class="game-canvas-container">
                <canvas id="layer1" width="768" height="576"></canvas>
            </div>
            
            <div class="speed-indicator">
                <div class="speed-label">Mach Velocity</div>
                <div class="speed-bars">
                    <div class="speed-bar"><div class="bar-fill" id="subsonicBar"></div></div>
                    <div class="speed-bar"><div class="bar-fill" id="transonicBar"></div></div>
                    <div class="speed-bar"><div class="bar-fill" id="supersonicBar"></div></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById("layer1");
        const ctx = canvas.getContext("2d");
        const WIDTH = 768, HEIGHT = 576;
        
        let x0 = 0, y0 = 0, x = 0, y = 0;
        let vx = 0, vy = 0, v = 0, vs = 200;
        let theta = 0, tt = 0, ttmax = 10;
        let myRun = false, drawPlane = false;
        let xRing = [], yRing = [], nRings = 0, sFact = 80;

        const pImage = new Image();
        pImage.src = 'data:image/svg+xml;base64,' + btoa(`<svg width="58" height="40" xmlns="http://www.w3.org/2000/svg"><path d="M 2,20 L 45,20 L 56,15 L 56,25 L 45,20 M 20,20 L 20,5 L 30,20 L 20,35 L 20,20" fill="#ff3366" stroke="#fff" stroke-width="2"/></svg>`);

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            return {
                x: evt.clientX - rect.left,
                y: evt.clientY - rect.top
            };
        }

        canvas.onmousedown = (e) => {
            const pos = getMousePos(e);
            x0 = pos.x; y0 = pos.y;
            x = x0; y = y0;
            nRings = 0; xRing = []; yRing = []; tt = 0;
            myRun = false; drawPlane = true;
        };

        window.onmousemove = (e) => {
            if (drawPlane && !myRun) {
                const pos = getMousePos(e);
                x = pos.x; y = pos.y;
            }
        };

        window.onmouseup = () => { if (drawPlane) myRun = true; };

        function update() {
            ctx.clearRect(0, 0, WIDTH, HEIGHT);
            
            // Draw Help Text
            if (!drawPlane) {
                ctx.fillStyle = "rgba(255,255,255,0.2)";
                ctx.font = "20px Orbitron";
                ctx.textAlign = "center";
                ctx.fillText("CLICK AND DRAG TO LAUNCH", WIDTH/2, HEIGHT/2);
            }

            if (drawPlane) {
                if (!myRun) {
                    vx = x - x0; vy = y - y0;
                    v = Math.sqrt(vx*vx + vy*vy);
                    theta = Math.atan2(vy, vx);
                    
                    // Draw trajectory line
                    ctx.beginPath();
                    ctx.strokeStyle = (v > vs) ? "#ff3366" : "#00ff88";
                    ctx.moveTo(x0, y0);
                    ctx.lineTo(x, y);
                    ctx.stroke();

                    updateUI(v / vs);
                } else {
                    // Movement logic
                    x0 += vx / sFact;
                    y0 += vy / sFact;
                    tt++;
                    
                    if (tt >= ttmax) {
                        nRings++;
                        xRing[nRings] = x0;
                        yRing[nRings] = y0;
                        tt = 0;
                    }
                    
                    // Stop if out of bounds
                    if (x0 < -100 || x0 > WIDTH + 100 || y0 < -100 || y0 > HEIGHT + 100) {
                        drawPlane = false;
                        myRun = false;
                    }
                }

                // Draw Rings
                ctx.beginPath();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "rgba(0, 242, 255, 0.5)";
                for (let i = 1; i <= nRings; i++) {
                    let rad = (tt + ttmax * (nRings - i)) * (vs / sFact);
                    ctx.moveTo(xRing[i] + rad, yRing[i]);
                    ctx.arc(xRing[i], yRing[i], rad, 0, Math.PI * 2);
                }
                ctx.stroke();

                // Draw Plane
                ctx.save();
                ctx.translate(x0, y0);
                ctx.rotate(theta);
                ctx.drawImage(pImage, -29, -20);
                ctx.restore();
            }
            requestAnimationFrame(update);
        }

        function updateUI(ratio) {
            document.getElementById('subsonicBar').style.width = Math.min(ratio / 0.8, 1) * 100 + '%';
            document.getElementById('transonicBar').style.width = Math.max(0, Math.min((ratio - 0.8) / 0.4, 1)) * 100 + '%';
            document.getElementById('supersonicBar').style.width = Math.max(0, Math.min((ratio - 1.2) / 0.8, 1)) * 100 + '%';
        }

        update();
    </script>
</body>
</html>


<canvas id="c" width="640" height="500" style="width:100%;display:block;border-radius:8px;cursor:pointer;"></canvas>
<div style="display:flex;gap:8px;flex-wrap:wrap;padding:8px 2px 2px;align-items:center;">
  <span style="font-size:12px;color:var(--color-text-secondary);">Click a medium to send a pulse:</span>
  <button class="mb" data-m="0" style="font-size:12px;padding:4px 14px;border-radius:14px;border:1.5px solid #6ab0ff;cursor:pointer;background:transparent;color:var(--color-text-primary);">🌬 Air</button>
  <button class="mb" data-m="1" style="font-size:12px;padding:4px 14px;border-radius:14px;border:1.5px solid #40e0ff;cursor:pointer;background:transparent;color:var(--color-text-primary);">💧 Water</button>
  <button class="mb" data-m="2" style="font-size:12px;padding:4px 14px;border-radius:14px;border:1.5px solid #b0c8e0;cursor:pointer;background:transparent;color:var(--color-text-primary);">⚙ Steel</button>
  <button class="mb" data-m="3" style="font-size:12px;padding:4px 14px;border-radius:14px;border:1.5px solid #d4a96a;cursor:pointer;background:transparent;color:var(--color-text-primary);">🌲 Wood</button>
</div>
<div id="factBox" style="margin-top:6px;font-size:12px;padding:9px 13px;border-radius:6px;background:var(--color-background-secondary);color:var(--color-text-secondary);line-height:1.7;min-height:36px;">
  Click any medium above to fire a sound pulse and watch the molecules vibrate!
</div>

<script>
(function(){
var canvas = document.getElementById('c');
var CW = 640, CH = 500;
var ctx = canvas.getContext('2d');

var MEDIA = [
  {
    name: 'Air', speed: 343, label: '343 m/s',
    bg: '#08101e', dotColor: '#7bbfff', dotR: 3.5, spacing: 38,
    rows: 4,
    fact: '🌬 <b>Air — 343 m/s</b> (about 767 mph)<br>Air molecules are far apart and loosely connected. Sound pushes each molecule into the next — like a slow game of dominoes. It\'s the slowest medium here because there\'s a lot of empty space between each bump.',
    bondColor: null
  },
  {
    name: 'Water', speed: 1481, label: '1,481 m/s',
    bg: '#011828', dotColor: '#40e8ff', dotR: 4, spacing: 22,
    rows: 5,
    fact: '💧 <b>Water — 1,481 m/s</b> (4× faster than air!)<br>Water molecules are packed close together and attract each other. A nudge travels much faster through the crowd. That\'s why whales can sing to each other across entire oceans — and why sonar works underwater.',
    bondColor: 'rgba(40,180,220,0.25)'
  },
  {
    name: 'Steel', speed: 5100, label: '5,100 m/s',
    bg: '#0c0e12', dotColor: '#c0d4ec', dotR: 5, spacing: 16,
    rows: 6,
    fact: '⚙ <b>Steel — 5,100 m/s</b> (15× faster than air!)<br>Steel atoms are locked in a tight rigid crystal. There\'s almost no gap between them — a vibration passes through almost instantly. Cowboys used to press an ear to a railway track to hear an approaching train long before it arrived.',
    bondColor: 'rgba(160,190,220,0.35)'
  },
  {
    name: 'Wood', speed: 3800, label: '~3,800 m/s',
    bg: '#120d06', dotColor: '#e0b87a', dotR: 4.5, spacing: 20,
    rows: 5,
    fact: '🌲 <b>Wood — ~3,800 m/s</b> (11× faster than air)<br>Wood is a stiff solid with long fibres packed together. Sound travels fast along the grain. Native Americans would press an ear to the ground to detect vibrations from distant buffalo herds or horses.',
    bondColor: 'rgba(200,160,80,0.25)'
  }
];

var BAND_H = CH / 4;

// build particle grids
var grids = [];
for (var m = 0; m < 4; m++) {
  var med = MEDIA[m];
  var y0 = m * BAND_H;
  var particles = [];
  var cols = Math.floor((CW - 80) / med.spacing) + 1;
  for (var row = 0; row < med.rows; row++) {
    for (var col = 0; col < cols; col++) {
      particles.push({
        bx: 80 + col * med.spacing,   // base x
        by: y0 + (BAND_H / (med.rows + 1)) * (row + 1), // base y
        ox: 0, oy: 0,  // current offsets
        vx: 0, vy: 0
      });
    }
  }
  grids.push({ particles: particles, cols: cols, rows: med.rows, spacing: med.spacing });
}

// pulses: {m, waveX, speed, amp, freq}
var pulses = [];
var tick = 0;

// auto-fire a gentle idle ripple per medium
var idlePhase = [0,0,0,0];

function firePulse(m) {
  var pxPerFrame = (MEDIA[m].speed / 5100) * 4.5;
  pulses.push({ m: m, waveX: 60, speed: pxPerFrame, amp: 7, freq: 0.22 });
  document.getElementById('factBox').innerHTML = MEDIA[m].fact;
}

document.querySelectorAll('.mb').forEach(function(b){
  b.onclick = function(){ firePulse(+b.dataset.m); };
});
canvas.addEventListener('click', function(e){
  var r = canvas.getBoundingClientRect();
  var cy = (e.clientY - r.top) / r.height * CH;
  var m = Math.min(3, Math.floor(cy / BAND_H));
  firePulse(m);
});

function draw() {
  ctx.clearRect(0,0,CW,CH);
  tick++;

  for (var m = 0; m < 4; m++) {
    var med = MEDIA[m];
    var y0 = m * BAND_H;
    var grid = grids[m];

    // background
    ctx.fillStyle = med.bg;
    ctx.fillRect(0, y0, CW, BAND_H);

    // divider
    ctx.strokeStyle = 'rgba(255,255,255,0.13)';
    ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(0,y0); ctx.lineTo(CW,y0); ctx.stroke();

    // collect active pulses for this medium
    var myPulses = pulses.filter(function(p){ return p.m === m; });

    // update particle displacements
    var pts = grid.particles;
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      var totalDx = 0;
      for (var pi = 0; pi < myPulses.length; pi++) {
        var pulse = myPulses[pi];
        var dist = p.bx - pulse.waveX;
        // gaussian envelope around the wavefront
        var env = Math.exp(-dist*dist / (2 * 28*28));
        // also a wake that trails behind
        var wake = dist < 0 ? Math.exp(-dist*dist / (2*60*60)) * 0.3 : 0;
        totalDx += (env + wake) * pulse.amp * Math.cos(dist * pulse.freq);
      }
      // gentle idle ripple
      var idleAmp = 0.6;
      var idleDx = idleAmp * Math.sin(tick * 0.025 + p.bx * 0.08 + p.by * 0.06);
      p.ox = totalDx + idleDx;
      // vertical thermal jitter
      p.oy = (med.spacing > 30 ? 0.8 : 0.3) * Math.sin(tick*0.04 + p.bx*0.13 + p.by*0.07);
    }

    // draw bonds (for dense media)
    if (med.bondColor) {
      ctx.strokeStyle = med.bondColor;
      ctx.lineWidth = 1;
      for (var i = 0; i < pts.length; i++) {
        var p = pts[i];
        var px2 = p.bx + p.ox, py2 = p.by + p.oy;
        // right neighbor
        if ((i+1) < pts.length && Math.floor(i/grid.cols) === Math.floor((i+1)/grid.cols)) {
          var n = pts[i+1];
          ctx.beginPath(); ctx.moveTo(px2,py2); ctx.lineTo(n.bx+n.ox,n.by+n.oy); ctx.stroke();
        }
        // below neighbor
        var below = i + grid.cols;
        if (below < pts.length) {
          var nb = pts[below];
          ctx.beginPath(); ctx.moveTo(px2,py2); ctx.lineTo(nb.bx+nb.ox,nb.by+nb.oy); ctx.stroke();
        }
      }
    }

    // draw particles
    for (var i = 0; i < pts.length; i++) {
      var p = pts[i];
      var px2 = p.bx + p.ox, py2 = p.by + p.oy;
      // color by compression (displacement magnitude)
      var comp = Math.abs(p.ox) / (med.amp || 8);
      var r = parseInt(med.dotColor.slice(1,3),16);
      var g = parseInt(med.dotColor.slice(3,5),16);
      var b2 = parseInt(med.dotColor.slice(5,7),16);
      // brighten when compressed
      var bright = Math.min(1, comp * 2.5);
      r = Math.min(255, r + bright*80);
      g = Math.min(255, g + bright*40);

      ctx.fillStyle = 'rgb('+Math.round(r)+','+Math.round(g)+','+Math.round(b2)+')';
      ctx.beginPath();
      ctx.arc(px2, py2, med.dotR * (1 + bright*0.4), 0, Math.PI*2);
      ctx.fill();
    }

    // advance pulses
    for (var pi = 0; pi < myPulses.length; pi++) {
      myPulses[pi].waveX += myPulses[pi].speed;
    }

    // wave front indicator line
    for (var pi = 0; pi < myPulses.length; pi++) {
      var wx = myPulses[pi].waveX;
      if (wx > 60 && wx < CW) {
        ctx.strokeStyle = med.dotColor + '88';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([3,4]);
        ctx.beginPath(); ctx.moveTo(wx, y0+4); ctx.lineTo(wx, y0+BAND_H-4); ctx.stroke();
        ctx.setLineDash([]);
      }
    }

    // remove finished pulses globally
    for (var pi = pulses.length-1; pi >= 0; pi--) {
      if (pulses[pi].waveX > CW + 50) pulses.splice(pi,1);
    }

    // SOURCE marker
    ctx.fillStyle = med.dotColor;
    ctx.beginPath(); ctx.arc(60, y0 + BAND_H/2, 7, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath(); ctx.arc(60, y0 + BAND_H/2, 3, 0, Math.PI*2); ctx.fill();

    // labels
    ctx.fillStyle = 'rgba(255,255,255,0.92)';
    ctx.font = 'bold 13px sans-serif';
    ctx.fillText(med.name, 8, y0 + 18);
    ctx.fillStyle = med.dotColor;
    ctx.font = '11px sans-serif';
    ctx.fillText(med.label, 8, y0 + 32);

    // molecule spacing annotation
    ctx.fillStyle = 'rgba(255,255,255,0.3)';
    ctx.font = '10px sans-serif';
    var spacingLabel = med.spacing > 30 ? 'molecules spread apart' : med.spacing > 18 ? 'molecules closer' : 'tightly packed';
    ctx.fillText(spacingLabel, 8, y0 + BAND_H - 7);
  }

  requestAnimationFrame(draw);
}

draw();

// auto-demo: fire each medium on load with a delay
setTimeout(function(){ firePulse(0); }, 400);
setTimeout(function(){ firePulse(1); }, 800);
setTimeout(function(){ firePulse(2); }, 1200);
setTimeout(function(){ firePulse(3); }, 1600);

})();
</script>
